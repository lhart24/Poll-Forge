services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - FRONTEND_URL=http://localhost:5173
      - PORT=5001

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5001
    ports:
      - "5173:80"
    depends_on:
      - server